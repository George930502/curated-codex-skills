name: Bug report
description: Report a reproducible defect in a skill, installer, or repository check.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Do not include credentials or private configuration. Report vulnerabilities privately.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest prompt or command sequence that reproduces the defect.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, shell, Codex version, and client surface.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation output
      description: Paste relevant output with sensitive values removed.
    validations:
      required: false
