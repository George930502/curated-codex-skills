name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-platform:
    name: Cross-platform / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Report environment
        run: python -c "import platform, sys; print(sys.version); print(platform.platform())"

      - name: Validate skills
        run: python -I scripts/validate.py --skills-dir skills

      - name: Check repository
        run: python scripts/check_repository.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  python-versions:
    name: Python / ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}

      - name: Run validation suite
        run: |
          python -VV
          python -I scripts/validate.py --skills-dir skills
          python scripts/check_repository.py
          python -m unittest discover -s tests -v

  result:
    name: CI
    if: always()
    needs: [cross-platform, python-versions]
    runs-on: ubuntu-latest
    steps:
      - name: Require all platform checks
        env:
          CROSS_PLATFORM_RESULT: ${{ needs.cross-platform.result }}
          PYTHON_RESULT: ${{ needs.python-versions.result }}
        run: test "$CROSS_PLATFORM_RESULT" = success && test "$PYTHON_RESULT" = success
